likelihood:
  planck_2018_lowl.TT:
    lmin: 2
    lmax: 29
    type: CMB
    aliases:
    - lowT
    speed: -1
    stop_at_error: false
    version: null
    input_params: []
    output_params: []
params:
  Omega_e:
    prior:
      min: 0.001
      max: 0.25
    ref:
      dist: norm
      loc: 0.05
    proposal: 0.005
    latex: \Omega_\mathrm{e}
  bg_regime:
    value: 1
    latex: bg_{\mathrm{regime}}
  a_star:
    value: 1.0e-15
    latex: a_{*}}
  n_e:
    value: 1.0
    latex: n_\mathrm{e}
  m_s:
    value: 3.0
    latex: m_\mathrm{s}
  Delta_e:
    prior:
      min: 0.001
      max: 0.24
    ref:
      dist: norm
      loc: 0.1
      scale: 0.01
    proposal: 0.005
    latex: \Delta_\mathrm{e}
  Delta_s:
    prior:
      min: 0.0001
      max: 0.05
    ref:
      dist: norm
      loc: 0.01
      scale: 0.002
    proposal: 0.001
    latex: \Delta_\mathrm{s}
  Delta_rho_s:
    prior:
      min: 0.0001
      max: 0.05
    ref:
      dist: norm
      loc: 0.01
      scale: 0.002
    proposal: 0.001
    latex: \Delta\rho_\mathrm{s}
  logA:
    prior:
      min: 1.61
      max: 3.91
    ref:
      dist: norm
      loc: 3.05
      scale: 0.001
    proposal: 0.001
    latex: \log(10^{10} A_\mathrm{s})
    drop: true
  A_s:
    value: 'lambda logA: 1e-10*np.exp(logA)'
    latex: A_\mathrm{s}
    derived: true
    renames:
    - As
  n_s:
    prior:
      min: 0.8
      max: 1.2
    ref:
      dist: norm
      loc: 0.965
      scale: 0.004
    proposal: 0.002
    latex: n_\mathrm{s}
    renames:
    - ns
  Omega_k:
    prior:
      min: 0.0
      max: 0.3
    ref:
      dist: norm
      loc: 0.01
      scale: 0.001
    proposal: 0.001
    latex: \Omega_k
    renames:
    - omegak
  H0:
    prior:
      min: 30
      max: 90
    ref:
      dist: norm
      loc: 67
      scale: 1
    proposal: 0.5
    latex: H_0
  omega_b:
    prior:
      min: 0.005
      max: 0.1
    ref:
      dist: norm
      loc: 0.0224
      scale: 0.0001
    proposal: 0.0001
    latex: \Omega_\mathrm{b} h^2
    renames:
    - omegabh2
  omega_cdm:
    prior:
      min: 0.001
      max: 0.99
    ref:
      dist: norm
      loc: 0.12
      scale: 0.001
    proposal: 0.0005
    latex: \Omega_\mathrm{c} h^2
    renames:
    - omegach2
  tau_reio:
    prior:
      min: 0.01
      max: 0.8
    ref:
      dist: norm
      loc: 0.055
      scale: 0.006
    proposal: 0.003
    latex: \tau_\mathrm{reio}
    renames:
    - tau
  z_reio:
    latex: z_\mathrm{re}
    derived: true
    renames:
    - zrei
  sigma8:
    latex: \sigma_8
    derived: true
  s8h5:
    derived: 'lambda sigma8, H0: sigma8*(H0*1e-2)**(-0.5)'
    latex: \sigma_8/h^{0.5}
  s8omegamp5:
    derived: 'lambda sigma8, Omega_m: sigma8*Omega_m**0.5'
    latex: \sigma_8 \Omega_\mathrm{m}^{0.5}
  s8omegamp25:
    derived: 'lambda sigma8, Omega_m: sigma8*Omega_m**0.25'
    latex: \sigma_8 \Omega_\mathrm{m}^{0.25}
  A:
    derived: 'lambda A_s: 1e9*A_s'
    latex: 10^9 A_\mathrm{s}
  clamp:
    derived: 'lambda A_s, tau_reio: 1e9*A_s*np.exp(-2*tau_reio)'
    latex: 10^9 A_\mathrm{s} e^{-2\tau}
  age:
    latex: '{\rm{Age}}/\mathrm{Gyr}'
    derived: true
  rs_drag:
    latex: r_\mathrm{drag}
    derived: true
    renames:
    - rdrag
  chi2__CMB:
    latex: \chi^2_\mathrm{CMB}
    derived: true
