likelihood:
  lingering_like:
    external: true
    input_params:
    - Omega_e
    - n_s
    - a_star
    - Omega_k
    - omega_cdm
    - Delta_rho_s
    - Delta_s
    - Delta_e
    - omega_b
    - n_e
    - H0
    - tau_reio
    - m_s
    - A_s
params:
  Omega_e:
    prior:
      min: 0.001
      max: 0.25
    proposal: 0.005
  a_star:
    value: 1.0e-15
  n_e:
    value: 1.0
  m_s:
    value: 3.0
  Delta_e:
    prior:
      min: 0.001
      max: 0.24
    proposal: 0.005
  Delta_s:
    prior:
      min: 0.0001
      max: 0.05
    proposal: 0.001
  Delta_rho_s:
    prior:
      min: 0.0001
      max: 0.05
    proposal: 0.001
  logA:
    prior:
      min: 1.61
      max: 3.91
    proposal: 0.001
    drop: true
  A_s:
    value: true
  Omega_k:
    prior:
      min: 0.0
      max: 0.3
    proposal: 0.001
  H0:
    prior:
      min: 30
      max: 90
    proposal: 0.5
  omega_b:
    prior:
      min: 0.005
      max: 0.1
    proposal: 0.0001
  omega_cdm:
    prior:
      min: 0.001
      max: 0.99
    proposal: 0.0005
  tau_reio:
    prior:
      min: 0.01
      max: 0.8
    proposal: 0.003
  n_s:
    prior:
      min: 0.8
      max: 1.2
    proposal: 0.002
sampler:
  mcmc:
    drag: false
    oversample_power: 0.4
    proposal_scale: 1.9
    covmat: auto
    Rminus1_stop: 0.01
    Rminus1_cl_stop: 0.2
output: .
