theory:
  classy:
    path: /home/lerufino/PlanckData/packages/class_public
    speed: 0.2
    stop_at_error: false
    extra_args:
      output: tCl, pCl, lCl
      l_max_scalars: 2600
      lensing: 'yes'
    ignore_obsolete: false
    use_renames: false
    renames:
      As: A_s
      ns: n_s
      nrun: alpha_s
      nrunrun: beta_s
      nt: n_t
      ntrun: alpha_t
      rdrag: rs_drag
      omegak: Omega_k
      omegal: Omega_Lambda
      w: w0_fld
      wa: wa_fld
      omegabh2: omega_b
      omegab: Omega_b
      omegach2: omega_cdm
      omegac: Omega_cdm
      omegam: Omega_m
      omegan: Omega_nu
      tau: tau_reio
      zrei: z_reio
      deltazrei: reionization_width
      helium_redshift: helium_fullreio_redshift
      helium_delta_redshift: helium_fullreio_width
      yhe: YHe
      yheused: YHe
    version: v3.3.4
    input_params:
    - A_s
    - n_s
    - H0
    - omega_b
    - omega_cdm
    - tau_reio
    - Omega_e
    - n_e
    - Omega_k
    output_params: []
likelihood:
  gauss_H0:
    type: []
    speed: -1
    stop_at_error: false
    version: null
    external: 'lambda H0: -0.5*((H0 - 67.4)/0.5)**2'
    input_params:
    - H0
    output_params: []
params:
  logA:
    prior:
      min: 1.61
      max: 3.91
    ref:
      dist: norm
      loc: 3.05
      scale: 0.001
    proposal: 0.001
    latex: \log(10^{10} A_\mathrm{s})
    drop: true
  A_s:
    value: 'lambda logA: 1e-10*np.exp(logA)'
    latex: A_\mathrm{s}
    derived: true
    renames:
    - As
  n_s:
    prior:
      min: 0.8
      max: 1.2
    ref:
      dist: norm
      loc: 0.965
      scale: 0.004
    proposal: 0.002
    latex: n_\mathrm{s}
    renames:
    - ns
  H0:
    prior:
      min: 55
      max: 91
    ref:
      dist: norm
      loc: 67.4
      scale: 0.5
    proposal: 0.5
    latex: H_0
  omega_b:
    prior:
      min: 0.005
      max: 0.1
    ref:
      dist: norm
      loc: 0.0224
      scale: 0.0001
    proposal: 0.0001
    latex: \Omega_\mathrm{b} h^2
    renames:
    - omegabh2
  omega_cdm:
    prior:
      min: 0.001
      max: 0.99
    ref:
      dist: norm
      loc: 0.12
      scale: 0.001
    proposal: 0.001
    latex: \Omega_\mathrm{cdm} h^2
    renames:
    - omegach2
  tau_reio:
    prior:
      min: 0.01
      max: 0.8
    ref:
      dist: norm
      loc: 0.055
      scale: 0.006
    proposal: 0.003
    latex: \tau_\mathrm{reio}
    renames:
    - tau
  Omega_e:
    prior:
      min: 0.0
      max: 0.5
    ref:
      dist: norm
      loc: 0.01
      scale: 0.005
    proposal: 0.005
    latex: \Omega_\mathrm{e}
  n_e:
    prior:
      min: 0.0
      max: 2.0
    ref:
      dist: norm
      loc: 0.0
      scale: 0.5
    proposal: 0.3
    latex: n_\mathrm{e}
  Omega_k:
    prior:
      min: -0.1
      max: 0.1
    ref:
      dist: norm
      loc: 0.0
      scale: 0.005
    proposal: 0.003
    latex: \Omega_K
    renames:
    - omegak
sampler:
  mcmc:
    burn_in: 0
    max_tries: 10000
    covmat: null
    covmat_params: null
    proposal_scale: 1.9
    output_every: 60s
    learn_every: 40d
    temperature: 1
    learn_proposal: true
    learn_proposal_Rminus1_max: 2.0
    learn_proposal_Rminus1_max_early: 30.0
    learn_proposal_Rminus1_min: 0.0
    max_samples: 50
    Rminus1_stop: 0.01
    Rminus1_cl_stop: 0.2
    Rminus1_cl_level: 0.95
    Rminus1_single_split: 4
    measure_speeds: true
    oversample_power: 0.4
    oversample_thin: true
    drag: true
    blocking:
    - - 1
      - - H0
    - - 1
      - - logA
        - n_s
        - omega_b
        - omega_cdm
        - tau_reio
        - Omega_e
        - n_e
        - Omega_k
    callback_function: null
    callback_every: null
    seed: null
    check_every: null
    oversample: null
    drag_limits: null
    fallback_covmat_scale: 4
    version: 3.5.7
output: lingering_exotic
