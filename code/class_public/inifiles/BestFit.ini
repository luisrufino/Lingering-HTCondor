# Output options: compute temperature (tCl), polarization (pCl), and lensing (lCl) power spectra
output = tCl lCl pCl

# Maximum multipole for scalar perturbations (Planck goes up to ~2500)
l_max_scalars = 2500

# Hubble parameter today (H0 / 100 km/s/Mpc)
h = 0.6732

# Physical baryon density: Ω_b h^2
Omega_b = 0.022383

# Physical cold dark matter density: Ω_c h^2
Omega_cdm = 0.12011

# Scalar amplitude of the primordial power spectrum (usually ~2.1e-9)
A_s = 2.1e-9

# Spectral index of scalar perturbations (scale-dependence)
n_s = 0.96605

# Optical depth to reionization
tau_reio = 0.0543

# Primordial helium fraction (important for recombination)
YHe = 0.2454

# CMB temperature today in Kelvin
T_cmb = 2.7255

# Effective number of relativistic species (standard is 3.046 for neutrinos)
N_ur = 3.046

# Maximum redshift at which the matter power spectrum is output
z_max_pk = 0.5

# Optional: set the root name of output files (default is 'test')
root = planck_bestfit
